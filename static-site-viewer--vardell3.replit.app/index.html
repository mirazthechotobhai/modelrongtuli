  try{
    const [p,c]=await Promise.all([tmdb('/person/'+id),tmdb('/person/'+id+'/combined_credits')]);
    const heroImg=p.profile_path?'<img class="person-photo" src="'+IMG+'/w185'+p.profile_path+'" alt="">':'<div class="person-photo" style="background:#1e293b;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" width="52" height="52"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>';
    $('person-hero-wrap').innerHTML='<div class="person-hero">'+heroImg+'<div><div class="person-name">'+p.name+'</div>'+(p.known_for_department?'<span class="person-dept">'+p.known_for_department+'</span>':'')+'</div></div>';
    $('person-bio').textContent=p.biography?p.biography.slice(0,800)+(p.biography.length>800?'...':''):'';
    const allWorks=(c.cast||[]).filter(w=>w.media_type==='movie'||w.media_type==='tv').sort((a,b)=>(b.popularity||0)-(a.popularity||0));
    const works=allWorks.filter(w=>w.poster_path);
    window._pw=works;
    if($('person-works-title'))$('person-works-title').textContent='All Works';
    if($('person-works-count'))$('person-works-count').textContent=works.length+' titles';
    $('person-works').innerHTML=works.map(function(w,i){
      const ct=w.media_type==='movie'?'movie':'tv';
      const r=w.vote_average?w.vote_average.toFixed(1):'';
      const yr=getYear(w)?'<span>'+getYear(w)+'</span>':'';
      const badge=r?'<span class="card-rating-badge">\u2605 '+r+'</span>':'';
      return '<div class="post-card" onclick="closePerson();triggerDetailTransition(window._pw['+i+'])">'+
             '<div class="thumb-wrap"><img src="'+imgUrl(w.poster_path,'w342')+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'+
             '<span class="card-label" style="background:'+typeBg(ct)+'">'+typeLabel(ct)+'</span>'+badge+'</div>'+
             '<div class="card-body"><div class="card-title">'+getTitle(w)+'</div><div class="card-meta">'+yr+'</div></div></div>';
    }).join('');
  }catch(e){}
  showLoading(false);
}
function closePerson(){$('person-view').classList.remove('open');if(!$('detail-view').classList.contains('open')){document.body.style.overflow='';document.documentElement.style.overflow='';}}
$('person-close-btn').onclick=closePerson;

// ── SKELETON LOADER ──────────────────────────────────────────────────────────
function showSkeletons(){
  $('posts-grid').innerHTML=Array(20).fill(0).map(()=>`<div class="skeleton-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div></div>`).join('');
}

// ── VOICE SEARCH ─────────────────────────────────────────────────────────────
(function(){
  const vBtn=$('voice-search-btn');
  if(!vBtn)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){vBtn.style.display='none';return;}
  const rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang='en-US';
  rec.onresult=e=>{const t=e.results[0][0].transcript;$('search-input').value=t;vBtn.classList.remove('listening');doSearch();};
  rec.onend=()=>vBtn.classList.remove('listening');
  rec.onerror=()=>vBtn.classList.remove('listening');
  vBtn.onclick=()=>{if(vBtn.classList.contains('listening')){rec.stop();}else{rec.start();vBtn.classList.add('listening');}};
})();

// -- DEEP LINKING ----------------------------------------------------------
function slugify(s){
  return (s||'').toLowerCase().replace(/[^a-z0-9 ]/g,'').trim().replace(/ +/g,'-').substring(0,60);
}
function setDetailHash(item){
  var slug=slugify(getTitle(item));
  var type=item.contentType;
  window.history.replaceState(null,'','#/'+type+'/'+slug+'/'+item.id);
}
function clearDetailHash(){
  window.history.replaceState(null,'',location.pathname+location.search);
}
async function openFromHash(){
  var hash=window.location.hash;
  if(!hash||hash.indexOf('#/')!==0)return;
  var parts=hash.slice(2).split('/');
  if(parts.length<3)return;
  var type=parts[0];
  var id=parseInt(parts[parts.length-1]);
  if(!id||type!=='movie'&&type!=='tv'&&type!=='anime')return;
  try{
    var item;
    if(type==='anime'){
      var q='query($id:Int){Media(id:$id,type:ANIME){id title{romaji english}coverImage{extraLarge large}averageScore startDate{year month day}format description(asHtml:false)}}';
      var r=await fetch('https://graphql.anilist.co',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{id:id}})});
      var d=await r.json();
      var m=d&&d.data&&d.data.Media;
      if(!m)return;
      var atitle=(m.title&&(m.title.english||m.title.romaji))||'';
      var sd=m.startDate||{};
      var mon=sd.month?String(sd.month).padStart(2,'0'):'01';
      var day=sd.day?String(sd.day).padStart(2,'0'):'01';
      var date=sd.year?(sd.year+'-'+mon+'-'+day):'';
      item={id:m.id,idMal:null,name:atitle,first_air_date:date,vote_average:m.averageScore?+(m.averageScore/10).toFixed(1):0,poster_path:(m.coverImage&&(m.coverImage.extraLarge||m.coverImage.large))||null,overview:(m.description||'').replace(/<[^>]+>/g,''),contentType:'anime'};
    }else{
      var d2=await tmdb('/'+type+'/'+id,{});
      if(!d2||!d2.id)return;
      item=Object.assign({},d2,{contentType:type});
    }
    openDetail(item);
  }catch(ex){}
}

// ── INIT ─────────────────────────────────────────────────────────────────────
showSkeletons();
loadTab(currentTab);
openFromHash();
</script>
